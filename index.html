<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>채팅콘 선택기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #2b2b2b;
            color: white;
            text-align: center;
            padding: 50px;
        }
        .emoticon-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .emoticon-item {
            background-color: #3b3b3b;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .emoticon-item:hover {
            transform: scale(1.05);
            background-color: #4b4b4b;
        }
        .emoticon-item img {
            max-width: 100px;
            height: auto;
            border-radius: 5px;
        }
        
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #00ffa3; 
            color: #000;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 16px;
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <h1>명령어를 클릭하면 복사됩니다!</h1>
    <p>채팅창에 붙여넣기(Ctrl+V) 해서 사용해 보세요.</p>

    <div id="toast">명령어가 복사되었습니다!</div>

    <div class="emoticon-grid">
        <div class="emoticon-item" onclick="autoCopy(this)">
            <img src="images/사과.png" alt="사과">
            <p>~사과</p>
        </div>

        <div class="emoticon-item" onclick="autoCopy(this)">
            <img src="images/만랩.png" alt="만랩">
            <p>~만랩</p>
        </div>
        
        </div>

    <script>
        // 파일명을 스스로 읽어서 ~명령어로 바꿔 복사해주는 똑똑한 함수
        function autoCopy(element) {
            // 1. 클릭한 박스 안에서 이미지(img) 태그를 찾습니다.
            const imgTag = element.querySelector('img');
            
            // 2. 이미지의 경로(src)를 가져옵니다. (예: "images/사과.png")
            let src = imgTag.getAttribute('src');
            
            // 3. 경로에서 맨 뒤에 있는 파일명만 뽑아냅니다. (예: "사과.png")
            let filename = src.split('/').pop();
            
            // 4. (중요) 인터넷 주소창 규칙 때문에 한글이 '%EC...' 처럼 깨진 걸 원래 한글로 되돌립니다.
            filename = decodeURIComponent(filename);
            
            // 5. 맨 뒤의 점(.)을 기준으로 확장자를 떼어냅니다. (예: "사과")
            let nameWithoutExt = filename.substring(0, filename.lastIndexOf('.'));
            
            // 만약 확장자가 없는 파일명이라면 원본 유지
            if (!nameWithoutExt) nameWithoutExt = filename;
            
            // 6. 파일명 앞에 '~'를 붙여서 명령어 완성!
            let command = "~" + nameWithoutExt;

            // 7. 클립보드에 복사
            navigator.clipboard.writeText(command).then(() => {
                showToast(`'${command}' 복사 완료!`);
            }).catch(err => {
                alert('복사에 실패했습니다. 직접 드래그해서 복사해 주세요!');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = "toast show";
            setTimeout(function() { 
                toast.className = toast.className.replace("show", ""); 
            }, 3000);
        }
    </script>
</body>
</html>
